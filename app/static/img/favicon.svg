<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="planet" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="45%" stop-color="#0077b6"/>
      <stop offset="100%" stop-color="#023e8a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Planet body -->
  <circle cx="16" cy="16" r="10" fill="url(#planet)"/>

  <!-- Surface highlight -->
  <ellipse cx="13" cy="13" rx="3.5" ry="2.2" fill="white" opacity="0.18"/>

  <!-- Orbital ring (ellipse, tilted) -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5" fill="none"
           stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.75"
           transform="rotate(-22 16 16)"/>

  <!-- Ring shadow behind planet (mask with dark arc) -->
  <path d="M 7.5 14.5 A 14.5 5 -22 0 1 24.5 17.5" fill="none"
        stroke="#0a0e1a" stroke-width="1.8"
        transform="rotate(-22 16 16)"/>

  <!-- Small dot on ring (station / satellite) -->
  <circle cx="29" cy="14.2" r="1.2" fill="#00b4d8"
          transform="rotate(-22 16 16)"/>
</svg>
