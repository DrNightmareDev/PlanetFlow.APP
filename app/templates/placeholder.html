{% extends "base.html" %}
{% block title %}{{ title }} – EVE PI Manager{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <h2 class="eve-page-title mb-0">
        <i class="{{ icon }} me-2 eve-accent"></i>{{ title }}
    </h2>
</div>

<div class="eve-card card border-0">
    <div class="card-body text-center py-5">
        <i class="{{ icon }} fs-1 text-muted d-block mb-3"></i>
        <h4>{{ title }}</h4>
        <p class="text-muted">{{ message }}</p>
        <span class="badge eve-badge-wip fs-6 px-3 py-2">In Entwicklung</span>
    </div>
</div>
{% endblock %}
