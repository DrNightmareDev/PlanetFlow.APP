services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evepi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evepi_secret}
      POSTGRES_DB: evepi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evepi -d evepi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Optional: PgBouncer connection pooler ─────────────────────────────────
  # Start with: docker compose --profile pgbouncer up
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    profiles: ["pgbouncer"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASES_HOST: db
      DATABASES_PORT: "5432"
      DATABASES_USER: evepi
      DATABASES_PASSWORD: ${DB_PASSWORD:-evepi_secret}
      DATABASES_DBNAME: evepi
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "500"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U evepi"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-evepi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-evepi_rabbit}
    ports:
      - "127.0.0.1:15672:15672"   # management UI — localhost only
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build: .
    user: "0:0"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    env_file: .env
    environment:
      DATABASE_URL: postgresql://evepi:${DB_PASSWORD:-evepi_secret}@db/evepi
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-evepi}:${RABBITMQ_PASS:-evepi_rabbit}@rabbitmq:5672//
    volumes:
      - ./app/static:/app/app/static:ro
      - sde_data:/app/data
    ports:
      # Direct access when nginx profile is not active.
      # If you use the nginx profile, comment this out or let nginx handle it.
      - "${APP_PORT:-8000}:8000"

  celery_worker:
    build: .
    user: "0:0"
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4", "-Q", "celery"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://evepi:${DB_PASSWORD:-evepi_secret}@db/evepi
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-evepi}:${RABBITMQ_PASS:-evepi_rabbit}@rabbitmq:5672//
    volumes:
      - sde_data:/app/data

  celery_beat:
    build: .
    user: "0:0"
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://evepi:${DB_PASSWORD:-evepi_secret}@db/evepi
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-evepi}:${RABBITMQ_PASS:-evepi_rabbit}@rabbitmq:5672//
    volumes:
      - sde_data:/app/data

  celery_ws:
    build: .
    user: "0:0"
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=1", "-Q", "ws", "--hostname=ws@%h"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://evepi:${DB_PASSWORD:-evepi_secret}@db/evepi
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-evepi}:${RABBITMQ_PASS:-evepi_rabbit}@rabbitmq:5672//
      CELERY_WS_AUTOSTART: "1"
    volumes:
      - sde_data:/app/data

  # ── Optional: Flower — Celery task monitor ─────────────────────────────────
  # Start with: docker compose --profile monitoring up
  flower:
    image: mher/flower:2.0
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-evepi}:${RABBITMQ_PASS:-evepi_rabbit}@rabbitmq:5672//
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASS:-flower_secret}
    ports:
      - "127.0.0.1:5555:5555"   # localhost only — proxy through nginx if needed

  # ── Optional: nginx reverse proxy ─────────────────────────────────────────
  # Start with: docker compose --profile nginx up
  # Skip this if you already have your own nginx/Caddy/Traefik in front.
  nginx:
    image: nginx:alpine
    profiles: ["nginx"]
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro

volumes:
  postgres_data:
  rabbitmq_data:
  sde_data:
