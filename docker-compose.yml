services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: planetflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-planetflow_secret}
      POSTGRES_DB: planetflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planetflow -d planetflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-planetflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-planetflow_rabbit}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - internal

  # ── Fix sde_data volume ownership so appuser (uid 1000) can write SDE cache ─
  sde_init:
    image: busybox
    user: "0:0"
    volumes:
      - sde_data:/app/data
    command: ["chown", "-R", "1000:1000", "/app/data"]
    restart: "no"
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    depends_on:
      sde_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    env_file: .env
    environment:
      DATABASE_URL: postgresql://planetflow:${DB_PASSWORD:-planetflow_secret}@db/planetflow
      RABBITMQ_USER: ${RABBITMQ_USER:-planetflow}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-planetflow_rabbit}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    volumes:
      - ./app/static:/app/app/static:ro
      - sde_data:/app/data
    expose:
      - "8000"
    networks:
      - internal
      - proxy

  celery_worker:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4", "-Q", "celery,esi,billing,ws"]
    depends_on:
      sde_init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://planetflow:${DB_PASSWORD:-planetflow_secret}@db/planetflow
      RABBITMQ_USER: ${RABBITMQ_USER:-planetflow}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-planetflow_rabbit}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    volumes:
      - sde_data:/app/data
    networks:
      - internal
      - proxy

  celery_wallet:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2", "-Q", "wallet", "--hostname=wallet@%h"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://planetflow:${DB_PASSWORD:-planetflow_secret}@db/planetflow
      RABBITMQ_USER: ${RABBITMQ_USER:-planetflow}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-planetflow_rabbit}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    volumes:
      - sde_data:/app/data
    networks:
      - internal
      - proxy

  celery_beat:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker/celery_entrypoint.sh"]
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://planetflow:${DB_PASSWORD:-planetflow_secret}@db/planetflow
      RABBITMQ_USER: ${RABBITMQ_USER:-planetflow}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-planetflow_rabbit}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    volumes:
      - sde_data:/app/data
    networks:
      - internal
      - proxy

  # ── nginx reverse proxy + TLS ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/nginx/nginx-entrypoint.sh"]
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/templates/https.conf.template:ro
      - ./docker/nginx.conf.bootstrap:/etc/nginx/templates/http.conf.template:ro
      - ./docker/nginx-entrypoint.sh:/etc/nginx/nginx-entrypoint.sh:ro
      - ./app/static:/app/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - proxy

  # ── Let's Encrypt certificate renewal ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renew twice daily; certbot only acts when cert is due for renewal (< 30d remaining)
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 43200 & wait $${!}; done"]
    networks:
      - proxy

  # ── Optional: PgBouncer connection pooler ─────────────────────────────────
  # Start with: docker compose --profile pgbouncer up
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    profiles: ["pgbouncer"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASES_HOST: db
      DATABASES_PORT: "5432"
      DATABASES_USER: planetflow
      DATABASES_PASSWORD: ${DB_PASSWORD:-planetflow_secret}
      DATABASES_DBNAME: planetflow
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "500"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U planetflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Optional: Flower — Celery task monitor ─────────────────────────────────
  # Start with: docker compose --profile monitoring up
  flower:
    image: mher/flower:2.0
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-planetflow}:${RABBITMQ_PASS:-planetflow_rabbit}@rabbitmq:5672//
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASS:-flower_secret}
    ports:
      - "127.0.0.1:5555:5555"
    networks:
      - internal

volumes:
  postgres_data:
  rabbitmq_data:
  sde_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    internal: true
  proxy:
