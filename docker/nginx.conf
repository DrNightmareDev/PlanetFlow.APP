# nginx.conf — PlanetFlow Production
# Handles HTTP→HTTPS redirect and reverse proxy to the app container.
# Let's Encrypt certificates are managed by the certbot service.

limit_req_zone $binary_remote_addr zone=planetflow_auth:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name planetflow.app www.planetflow.app;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name planetflow.app www.planetflow.app;

    ssl_certificate     /etc/letsencrypt/live/planetflow.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planetflow.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/planetflow.app/chain.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (enable after confirming HTTPS works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Static files served directly by nginx
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to app container
    # resolver points at Docker's internal DNS so nginx re-resolves 'app'
    # on every request instead of caching the IP at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://app:8000;

    # Drop common secret/repo probes at the edge so they never hit the app.
    location ~* (^|/)\.(env|env\..*|git|hg|svn|bzr|DS_Store|htaccess|htpasswd) {
        access_log off;
        return 404;
    }

    location ~* /(config|files|src|media|project)/\.git/ {
        access_log off;
        return 404;
    }

    location ~ ^/auth/(login|callback|add-character|refresh-scopes)$ {
        limit_req zone=planetflow_auth burst=20 nodelay;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # KillIntel analysis can take up to 3 min for 50 pilots
    location ~ ^/intel/killintel/analyze {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
