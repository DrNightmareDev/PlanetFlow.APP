[databases]
; Route planetflow database to the real Postgres container.
; When using Docker Compose the host is "db"; adjust for native installs.
planetflow = host=db port=5432 dbname=planetflow

[pgbouncer]
listen_port = 5432
listen_addr = 0.0.0.0
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; transaction pooling — safe for SQLAlchemy with NullPool or short-lived sessions
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
